project_id = "physics-command-center"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = []

[auth]
enabled = true
site_url = "http://localhost:3000"
jwt_expiry = 3600
enable_signup = true
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
otp_length = 6

[auth.sessions]
timebox = "24h"
inactivity_timeout = "2h"

[edge_runtime]
enabled = true
policy = "per_worker"

[analytics]
enabled = true
backend = "postgres"

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "50MiB"
